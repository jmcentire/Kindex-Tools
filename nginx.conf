map $http_accept $serve_markdown {
    default        0;
    "~*text/markdown" 1;
}

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- Agent-readiness: static text files with explicit Content-Type ---
    location = /robots.txt {
        types { } default_type "text/plain; charset=utf-8";
        add_header Cache-Control "public, max-age=3600";
    }

    location = /llms.txt {
        types { } default_type "text/markdown; charset=utf-8";
        add_header Cache-Control "public, max-age=3600";
    }

    location = /llms-full.txt {
        types { } default_type "text/markdown; charset=utf-8";
        add_header Cache-Control "public, max-age=3600";
    }

    location = /sitemap.xml {
        types { } default_type "application/xml; charset=utf-8";
        add_header Cache-Control "public, max-age=3600";
    }

    # --- /.well-known/* JSON manifests ---
    location = /.well-known/mcp/server-card.json {
        types { } default_type "application/json; charset=utf-8";
        add_header Cache-Control "public, max-age=3600";
        add_header Access-Control-Allow-Origin "*";
    }

    location = /.well-known/agent-skills/index.json {
        types { } default_type "application/json; charset=utf-8";
        add_header Cache-Control "public, max-age=3600";
        add_header Access-Control-Allow-Origin "*";
    }

    # Catch-all for any other JSON/YAML under /.well-known/
    location ~* ^/\.well-known/.*\.json$ {
        types { } default_type "application/json; charset=utf-8";
        add_header Cache-Control "public, max-age=3600";
        add_header Access-Control-Allow-Origin "*";
    }

    location ~* ^/\.well-known/.*\.ya?ml$ {
        types { } default_type "application/yaml; charset=utf-8";
        add_header Cache-Control "public, max-age=3600";
        add_header Access-Control-Allow-Origin "*";
    }

    # --- API Catalog (RFC 9727): application/linkset+json ---
    location = /.well-known/api-catalog {
        types { } default_type "application/linkset+json; charset=utf-8";
        add_header Cache-Control "public, max-age=3600";
        add_header Access-Control-Allow-Origin "*";
    }

    # --- HTTP Message Signatures directory (RFC 9421 / Web Bot Auth) ---
    location = /.well-known/http-message-signatures-directory {
        types { } default_type "application/http-message-signatures-directory; charset=utf-8";
        add_header Cache-Control "public, max-age=3600";
        add_header Access-Control-Allow-Origin "*";
    }

    # --- Homepage: Link header + optional markdown negotiation ---
    location = / {
        add_header Link "</llms.txt>; rel=\"alternate\"; type=\"text/markdown\"; title=\"LLM summary\", </.well-known/mcp/server-card.json>; rel=\"mcp-server-card\"; type=\"application/json\", </.well-known/agent-skills/index.json>; rel=\"agent-skills\"; type=\"application/json\", </.well-known/api-catalog>; rel=\"api-catalog\"; type=\"application/linkset+json\"" always;

        # Markdown content negotiation: clients asking for text/markdown get llms-full.txt
        if ($serve_markdown) {
            rewrite ^ /llms-full.txt last;
        }

        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/markdown image/svg+xml;
}
